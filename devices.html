<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <title>تقرير عهد إكترونية</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
  <style>
    body {
      font-family: 'Cairo', sans-serif;
      direction: rtl;
      background-color: #f0f0f0;
      margin: 0; padding: 0 10px;
    }
    h2 { text-align: center; margin-top: 20px; }
    form {
      background: #fff;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px #ccc;
      max-width: 600px;
      margin: 20px auto;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    input, textarea, button {
      padding: 14px;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }
    button {
      background-color: green;
      color: white;
      cursor: pointer;
    }
    button:hover { background-color: darkgreen; }
    .search-container {
      text-align: center;
      margin: 20px auto;
    }
    .search-container input {
      padding: 14px;
      font-size: 16px;
      border-radius: 6px;
      border: 1px solid #ccc;
      width: 300px;
      background-size: 18px;
      background-repeat: no-repeat;
      background-position: 10px center;
      padding-right: 35px;
    }
    table {
      width: 100%;
      background: #fff;
      margin: 20px auto;
      border-collapse: collapse;
      box-shadow: 0 0 10px #ccc;
    }
    th, td {
      padding: 10px;
      border: 1px solid #ccc;
      text-align: center;
    }
    th { background-color: #007bff; color: white; }
    .actions button {
      margin: 0 2px;
      padding: 6px 10px;
      font-size: 14px;
      border-radius: 5px;
      border: none;
      cursor: pointer;
    }
    .edit-btn { background-color: #28a745; color: white; }
    .delete-btn { background-color: #dc3545; color: white; }
    .export-buttons {
      margin-top: 20px;
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .footer-button {
      text-align: center;
      margin: 25px;
    }
    @media print {
      form,
      .search-container,
      .export-buttons,
      .footer-button,
      th.actions,
      td.actions {
        display: none !important;
      }
    }
  </style>
</head>
<body>
  <h2>بيانات عهد إكترونية</h2>

  <form id="devicesForm">
  <input type="text"   id="custodyName"     placeholder="اسم العهدة">
  <input type="text"   id="deviceType"      placeholder="نوع الجهاز">
  <input type="number" id="quantity"        placeholder="العدد">
  <input type="text"   id="serialNumber"    placeholder="الرقم التسلسل للجهاز">
  <input type="text"   id="custodyLocation" placeholder="موقع العهدة">
  <textarea id="notes" placeholder="ملاحظات"></textarea>
  <button type="submit">إرسال</button>
</form>


  <div class="search-container">
    <input type="text" id="searchInput" placeholder="🔍 ابحث في كل الحقول">
  </div>
  <div id="loading">جاري تحميل البيانات...</div>

   <table id="devicesTable" style="display:none;">
  <thead>
    <tr>
      <th>م</th>
      <th>اسم العهدة</th>
      <th>نوع الجهاز</th>
      <th>العدد</th>
      <th>الرقم التسلسل للجهاز</th>
      <th>موقع العهدة</th>
      <th>ملاحظات</th>
      <th class="actions">الإجراء</th>
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>

  <div class="export-buttons">
    <button onclick="exportToExcel()">📊 تصدير Excel</button>
    <button onclick="window.print()">🖨️ طباعة</button>
  </div>

  <div class="footer-button">
    <button onclick="location.href='index.html'">↩️ رجوع</button>
  </div>

 <script>
 const scriptURL = "https://script.google.com/macros/s/AKfycbzRNz-YL7XSh-kebBTZumKip8iTosaw19fe6C_aW4pq03FfxzLinLXrz31i5pP3b42OZQ/exec";

  
 const form = document.getElementById("devicesForm");

  let isEditMode = false;
  let editserialNumber = null;

 form.addEventListener("submit", (e) => {
  e.preventDefault();

  const formData = new FormData();
  formData.append("اسم العهدة",     document.getElementById("custodyName").value.trim());
  formData.append("نوع الجهاز",     document.getElementById("deviceType").value.trim());
  formData.append("العدد",          document.getElementById("quantity").value.trim());
  formData.append("الرقم التسلسل للجهاز", document.getElementById("serialNumber").value.trim());
  formData.append("موقع العهدة",    document.getElementById("custodyLocation").value.trim());
  formData.append("ملاحظات",        document.getElementById("notes").value.trim());
  formData.append("action",         isEditMode ? "edit" : "add");

 fetch(scriptURL, {
      method: "POST",
      body: formData
    })
    .then(res => res.text())
    .then(msg => {
      alert(msg);               // هنا تشوف "تم الإضافة بنجاح"
      form.reset();
      isEditMode = false;
      editSerialNumber = null;
      loadData();               // ⚠️ مهم: يعيد تحميل الجدول من الشيت
    })
    .catch(err => {
      console.error("Error!", err);
      alert("❌ حدث خطأ في الاتصال");
    });
  });
  
 function loadData() {
  document.getElementById("loading").style.display = "block";

  fetch(scriptURL)
    .then(res => res.json())
    .then(data => {
      devicesData = data; // نخزن البيانات في متغير عام لو احتجناها في editRow

      const tbody = document.getElementById("tableBody");
      tbody.innerHTML = "";

      // مهم جداً: استخدم data هنا **داخل** الـ then
      data.forEach((item, index) => {
        const row = document.createElement("tr");
        row.innerHTML = `
          <td>${index + 1}</td>
          <td>${item["اسم العهدة"] || ""}</td>
          <td>${item["نوع الجهاز"] || ""}</td>
          <td>${item["العدد"] || ""}</td>
          <td>${item["الرقم التسلسل للجهاز"] || ""}</td>
          <td>${item["موقع العهدة"] || ""}</td>
          <td>${item["ملاحظات"] || ""}</td>
          <td class="actions">
            <button class="edit-btn" onclick="editRow(${index})">✏️ تعديل</button>
           <button class="delete-btn" onclick='deleteRow(${JSON.stringify(item["الرقم التسلسل للجهاز"] || "")})'>🗑️ حذف</button>
          </td>
        `;
        tbody.appendChild(row);
      });

      document.getElementById("devicesTable").style.display = "table";
      document.getElementById("loading").style.display = "none";
    })
    .catch(err => {
      console.error("❌ فشل تحميل البيانات:", err);
      alert("❌ حدث خطأ أثناء تحميل البيانات");
    });
}


      document.getElementById("devicesTable").style.display = "table";
    


function editRow(index) {
  const item = window.devicesData[index];

  document.getElementById("custodyName").value     = item["اسم العهدة"] || "";
  document.getElementById("deviceType").value      = item["نوع الجهاز"] || "";
  document.getElementById("quantity").value        = item["العدد"] || "";
  document.getElementById("serialNumber").value    = item["الرقم التسلسل للجهاز"] || "";
  document.getElementById("custodyLocation").value = item["موقع العهدة"] || "";
  document.getElementById("notes").value           = item["ملاحظات"] || "";

  isEditMode = true;
  editSerialNumber = item["الرقم التسلسل للجهاز"]; // لو بتستخدمه كمفتاح
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function deleteRow(serialNumber) {
  if (!confirm("هل أنت متأكد من الحذف؟")) return;

  const formData = new FormData();
  formData.append("action", "delete");
  formData.append("الرقم التسلسل للجهاز", serialNumber);

  fetch(scriptURL, {
    method: "POST",
    body: formData
  })
    .then(res => res.text())
    .then(msg => {
      alert(msg);
      loadData();
    })
    .catch(err => {
      console.error(err);
      alert("❌ حدث خطأ أثناء الحذف");
    });
}

  
 document.getElementById("searchInput").addEventListener("input", function () {
  const filter = this.value.toLowerCase();
  const rows = document.querySelectorAll("#devicesTable tbody tr");
  rows.forEach(row => {
    const match = Array.from(row.children).some(cell =>
      cell.textContent.toLowerCase().includes(filter)
    );
    row.style.display = match ? "" : "none";
  });
});


  function exportToExcel() {
    // 🔁 نفس الشيء: استخدم id الجديد للجدول
    const table = document.getElementById("devicesTable");
    const workbook = XLSX.utils.table_to_book(table, { sheet: "عهد إكترونية" });
    XLSX.writeFile(workbook, "عهد إكترونية.xlsx");
  }

  window.onload = loadData;
</script>
</body>
</html>
