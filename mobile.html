<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <title>تقرير الهواتف الكفية</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
  <style>
    body {
      font-family: 'Cairo', sans-serif;
      direction: rtl;
      background-color: #f0f0f0;
      margin: 0; padding: 0 10px;
    }
    h2 { text-align: center; margin-top: 20px; }
    form {
      background: #fff;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px #ccc;
      max-width: 600px;
      margin: 20px auto;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    input, textarea, button {
      padding: 14px;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }
    button {
      background-color: green;
      color: white;
      cursor: pointer;
    }
    button:hover { background-color: darkgreen; }
    .search-container {
      text-align: center;
      margin: 20px auto;
    }
    .search-container input {
      padding: 14px;
      font-size: 16px;
      border-radius: 6px;
      border: 1px solid #ccc;
      width: 300px;
    }
    table {
      width: 100%;
      background: #fff;
      margin: 20px auto;
      border-collapse: collapse;
      box-shadow: 0 0 10px #ccc;
    }
    th, td {
      padding: 10px;
      border: 1px solid #ccc;
      text-align: center;
    }
    th { background-color: #007bff; color: white; }
    .actions button {
      margin: 0 2px;
      padding: 6px 10px;
      font-size: 14px;
      border-radius: 5px;
      border: none;
      cursor: pointer;
    }
   .edit-btn {
  background-color: #28a745; /* أخضر */
  color: white;
  border: none;
  padding: 6px 12px;
  border-radius: 5px;
  cursor: pointer;
}

.delete-btn {
  background-color: #dc3545; /* أحمر */
  color: white;
  border: none;
  padding: 6px 12px;
  border-radius: 5px;
  cursor: pointer;
}

/* تأثير عند المرور */
.edit-btn:hover {
  background-color: #218838;
}

.delete-btn:hover {
  background-color: #c82333;
}
    .export-buttons {
      margin-top: 20px;
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .footer-button {
      text-align: center;
      margin: 25px;
    }
    @media print {
      form, .search-container, .export-buttons, .footer-button, th.actions, td.actions {
        display: none !important;
      }
    }
  </style>
</head>
<body>
  <h2>بيانات الهواتف الكفية</h2>

  <form id="mobile">
     <input type="text" id="custodianName" name="custodianName" placeholder="اسم صاحب العهدة">
    <input type="text" id="deviceName" name="deviceName" placeholder="اسم الجهاز" >
    <input type="text" id="deviceType" name="deviceType" placeholder="نوع الجهاز" >
    <input type="text" id="serialNumber" name="serialNumber" placeholder="الرقم التسلسل للجهاز" >
    <input type="text" id="deviceCode" name="deviceCode" placeholder="رمز الجهاز">
    <textarea id="notes" name="notes" placeholder="ملاحظات"></textarea>
    <input type="hidden" id="serial_original" name="serial_original" value="">
    <button type="submit">إرسال</button>
  </form>

  <div class="search-container">
    <input type="text" id="searchInput" placeholder="🔍 ابحث في كل الحقول">
  </div>


  <table id="mobileTable">
  <thead>
    <tr>
      <th>اسم صاحب العهدة</th>
      <th>اسم الجهاز</th>
      <th>نوع الجهاز</th>
      <th>الرقم التسلسل للجهاز</th>
      <th>رمز الجهاز</th>
      <th>ملاحظات</th>
      <th class="actions">الإجراء</th>
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>

  <div class="export-buttons">
    <button onclick="exportToExcel()">تصدير Excel</button>
    <button onclick="window.print()">🖨️ طباعة</button>
  </div>

  <div class="footer-button">
    <button onclick="location.href='index.html'">↩️ رجوع</button>
  </div>

  <script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbwsrYRVgAtkYJMBS1J4nwSEeFTGHk5y75m8aD_OxZont90626q1-_xBBEJhc8rCr5x4/exec"; // غيّرها إلى رابط سكربتك

    const form = document.getElementById("mobile");
    let isEditMode = false;

    form.addEventListener("submit", e => {
      e.preventDefault();

      const formData = new FormData();
      formData.set("اسم صاحب العهدة", (document.getElementById("custodianName").value || "").trim());
      formData.set("اسم الجهاز", document.getElementById("deviceName").value.trim());
      formData.set("نوع الجهاز", document.getElementById("deviceType").value.trim());
      formData.set("الرقم التسلسل للجهاز", document.getElementById("serialNumber").value.trim());
      formData.set("رمز الجهاز",  document.getElementById("deviceCode").value.trim());
      formData.set("ملاحظات", document.getElementById("notes").value.trim());
      formData.set("serial_original", document.getElementById("serial_original").value.trim());
      formData.set("action", isEditMode ? "edit" : "add");

      fetch(scriptURL, { method: 'POST', body: formData })
        .then(res => res.text())
        .then(msg => {
          alert(msg);
          form.reset();
          document.getElementById("serial_original").value = "";
          isEditMode = false;
          loadData();
        })
        .catch(error => {
          console.error("Error!", error);
          alert("❌ حدث خطأ في الاتصال");
        });
    });

   function loadData() {
  fetch(scriptURL)
    .then(res => res.json())
    .then(data => {
      const tbody = document.getElementById("tableBody");
      if (!tbody) return; // حماية

      tbody.innerHTML = "";
      window.labtopData = data;

      data.forEach((item, index) => {
        const row = document.createElement("tr");
        row.innerHTML = `
          <td>${item["اسم صاحب العهدة"] || ""}</td>
          <td>${item["اسم الجهاز"] || ""}</td>
          <td>${item["نوع الجهاز"] || ""}</td>
          <td>${item["الرقم التسلسل للجهاز"] || ""}</td>
          <td>${item["رمز الجهاز"] || ""}</td>
          <td>${item["ملاحظات"] || ""}</td>
        <td class="actions">
  <button class="edit-btn" onclick="editRow(${index})">
    ✏️ تعديل
  </button>

  <button class="delete-btn" onclick="deleteRow('${item["الرقم التسلسل للجهاز"]}')">
    🗑️ حذف
  </button>
</td>
        `;
        tbody.appendChild(row);
      });

      const table = document.getElementById("mobileTable");
      const loading = document.getElementById("loading");

      if (table) table.style.display = "table";
      if (loading) loading.style.display = "none";
    })
    .catch(err => {
      console.error("❌ فشل تحميل البيانات:", err);
      alert("❌ حدث خطأ أثناء تحميل البيانات");
    });
}
    function editRow(index) {
      const item = window.labtopData[index];
      document.getElementById("custodianName").value = item["اسم صاحب العهدة"] || "";
      document.getElementById("deviceName").value = item["اسم الجهاز"];
      document.getElementById("deviceType").value = item["نوع الجهاز"];
      document.getElementById("serialNumber").value = item["الرقم التسلسل للجهاز"];
      document.getElementById("deviceCode").value     = item["رمز الجهاز"];
      document.getElementById("notes").value = item["ملاحظات"];
      document.getElementById("serial_original").value = item["الرقم التسلسل للجهاز"];
      isEditMode = true;
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function deleteRow(serialNumber) {
      if (confirm("هل أنت متأكد أنك تريد حذف هذا الجهاز؟")) {
        const formData = new FormData();
        formData.append("action", "delete");
        formData.append("serial_original", serialNumber);

        fetch(scriptURL, { method: 'POST', body: formData })
          .then(res => res.text())
          .then(msg => {
            alert(msg);
            loadData();
          })
          .catch(err => {
            console.error(err);
            alert("❌ حدث خطأ أثناء الحذف");
          });
      }
    }

    document.getElementById("searchInput").addEventListener("input", function () {
      const filter = this.value.toLowerCase();
      const rows = document.querySelectorAll("#mobileTable tbody tr");
      rows.forEach(row => {
        const match = Array.from(row.children).some(cell =>
          cell.textContent.toLowerCase().includes(filter)
        );
        row.style.display = match ? "" : "none";
      });
    });

    function exportToExcel() {
      const table = document.getElementById("mobileTable");
      const wb = XLSX.utils.table_to_book(table, { sheet: "الهواتف الكفية" });
      XLSX.writeFile(wb, "بيانات_الأجهزة.xlsx");
    }

    loadData();

    window.addEventListener("DOMContentLoaded", function() {
});
  </script>
</body>
</html>
