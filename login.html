<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>تسجيل الدخول | تطبيق إدارة أنظمة وأجهزة قسم تقنية المعلومات</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Cairo', sans-serif;
      margin: 0;
      background: linear-gradient(to bottom right, #e5eaee, #218cc2);
      color: white;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ========== الهيدر ========== */
    header {
      width: 100%;
      padding-top: 25px;
      position: relative;
      text-align: center;
    }

    /* النصوص على اليمين */
    .right-text {
      position: absolute;
      right: 25px;
      top: 15px;
      text-align: right;
      color: #000;
    }

    .right-text h2,
    .right-text h3,
    .right-text h4 {
      margin: 0;
      font-weight: 600;
    }

    /* الشعار */
    .logo-container {
      margin-top: 10px;
      display: flex;
      justify-content: center;
    }

    .logo {
      width: 130px;
      height: auto;
      display: block;
    }

    /* النصوص تحت الشعار */
    .center-title {
      text-align: center;
      margin-top: 10px;
      color: #000;
    }

    .center-title h1 {
      font-size: 2rem;
      margin: 10px 0 0;
      font-weight: 700;
    }

    .center-title h2 {
      margin: 5px 0;
      opacity: 0.9;
      font-size: 1.2rem;
    }

    /* ========== صندوق تسجيل الدخول ========== */
    .login-box {
      background: rgba(255, 255, 255, 0.17);
      padding: 35px 45px;
      border-radius: 15px;
      backdrop-filter: blur(8px);
      text-align: center;
      margin-top: auto;
      margin-bottom: auto;
      box-shadow: 0 4px 20px rgba(0,0,0,0.25);
      color: #000;
    }

    .login-box h2 {
      font-size: 1.2rem;
      margin-bottom: 20px;
      font-weight: 600;
    }

    .login-box input {
      width: 230px;
      padding: 10px;
      border-radius: 6px;
      border: none;
      text-align: center;
      outline: none;
      margin-bottom: 15px;
      font-size: 15px;
    }

    .login-box button {
      background: #218cc2;
      color: #fff;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
      font-size: 15px;
    }

    .login-box button:hover {
      background: #166b94;
    }

    footer {
      margin-bottom: 20px;
      font-size: 14px;
      opacity: 0.9;
      color: #000;
    }
  </style>
</head>

<body>

  <!-- ========== الهيدر ========== -->
  <header>

    <!-- نصوص اليمين -->
    <div class="right-text">
      <h2>سلطنة عمان</h2>
      <h3>هيئة حماية المستهلك</h3>
      <h4>إدارة حماية المستهلك بمحافظة الظاهرة</h4>
    </div>

    <!-- الشعار -->
    <div class="logo-container">
      <img src="image1.png" alt="شعار سلطنة عمان" class="logo">
    </div>

  </header>

  <!-- النصوص الرئيسية تحت الشعار -->
  <div class="center-title">
    <h1>تطبيق إدارة الأنظمة والأجهزة</h1>
    <h2>قسم تقنية المعلومات</h2>
  </div>

  <!-- ========== صندوق تسجيل الدخول ========== -->
  <div class="login-box">
    <h2>الرجاء إدخال الرقم الوظيفي</h2>
    <input type="text" id="empID" placeholder="الرقم الوظيفي">
    <br>
    <button onclick="login()">دخول</button>
  </div>

  <footer>
    &copy; 2025 قسم تقنية المعلومات – جميع الحقوق محفوظة
  </footer>

  <script>
    const allowedIDs = ['376', '373', '5011', '2271', '5010'];

    function login() {
      const id = document.getElementById('empID').value.trim();

      if (allowedIDs.includes(id)) {
        sessionStorage.setItem('authenticated', 'true');
        window.location.href = 'index.html';  // الانتقال لصفحة البطاقات
      } else {
        alert('الرقم الوظيفي غير مصرح به.');
      }
    }
 
// منع كليك يمين
document.addEventListener('contextmenu', function (e) {
  e.preventDefault();
});

// منع بعض إختصارات لوحة المفاتيح لفتح الكونسول
document.addEventListener('keydown', function (e) {
  // F12
  if (e.key === 'F12') {
    e.preventDefault();
  }

  // Ctrl + Shift + I / J / C
  if (e.ctrlKey && e.shiftKey && ['I', 'J', 'C'].includes(e.key)) {
    e.preventDefault();
  }

  // Ctrl + U (عرض كود الصفحة)
  if (e.ctrlKey && e.key === 'U') {
    e.preventDefault();
  }
});
 </script>
</body>
</html>
